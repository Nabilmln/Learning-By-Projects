<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="accordion">

        <div class="accordion-item">
            <button class="accordion-header">Apa itu JavaScript?</button>
            <div class="accordion-content">
                <p>JavaScript adalah bahasa pemrograman yang digunakan untuk membuat website menjadi interaktif.</p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header">Apa itu DOM?</button>
            <div class="accordion-content">
                <p>DOM adalah struktur dokumen HTML yang bisa dimanipulasi menggunakan JavaScript.</p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header">Apa itu Event?</button>
            <div class="accordion-content">
                <p>Event adalah aksi seperti klik, hover, atau input dari pengguna.</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
