<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Custom Dropdown</title>
</head>
<body>
    <div class="dropdown">
        <div class="dropdown-header">
            <span id="selectedText">Select an item</span>  
            <span id="arrow">▼</span>
        </div>

        <div class="dropdown-list">
            <div class="dropdown-item">Mangga</div>
            <div class="dropdown-item">Apel</div>
            <div class="dropdown-item">Pisang</div>
            <div class="dropdown-item">Kelapa</div>
    </div>


    <script src="script.js"></script>
</body>
</html>
