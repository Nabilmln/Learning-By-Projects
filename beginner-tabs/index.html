<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs Project</title>
    <link rel="stylesheet" href="style.css">
<body>
    <div class="tabs">
        <button class="tab active" data-id="tab1">First Tab</button>
        <button class="tab" data-id="tab2">Second Tab</button>
        <button class="tab" data-id="tab3">Third Tab</button>
        <button class="tab" data-id="tab4">Fourth Tab</button>
    </div>

    <div class="content">
        <div class="tab-content active" id="tab1">
            <img src="assets/dog.jpeg" alt="puppy">
            <p>Puppies are cute</p>
        </div>
        <div class="tab-content" id="tab2">
            <img src="assets/lion.jpg" alt="lion">
            <p>Lion are big</p>
        </div>
        <div class="tab-content" id="tab3">
            <img src="assets/fox.jpg" alt="fox">
            <p>Fox is smart</p>
        </div>
        <div class="tab-content" id="tab4">
            <img src="assets/zebra.jpg" alt="zebra">
            <p>Zebra are striped</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
