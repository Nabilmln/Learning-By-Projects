<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted Textarea</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="textarea-box">

        <textarea 
            id="textarea"
            placeholder="User should not be allowed to enter more than the maximum character count of 250."
        ></textarea>

        <span id="counter">0 / 250</span>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
